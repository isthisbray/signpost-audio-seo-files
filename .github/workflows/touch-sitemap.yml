name: Refresh sitemap lastmod dates

# Runs every Monday at 09:00 UTC to keep freshness signals strong for Google
# Also runnable on-demand from Actions tab

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update lastmod dates in sitemap.xml
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          # Replace all <lastmod> dates with today
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain sitemap.xml)" ]]; then
            git add sitemap.xml
            git commit -m "chore: refresh sitemap lastmod dates"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Ping Google to recrawl
        run: |
          curl -sS "https://www.google.com/ping?sitemap=https://seo.signpostaudio.com/sitemap.xml" || true
